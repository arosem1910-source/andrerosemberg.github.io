<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato — André Rosemberg</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a class="site-title" href="index.html">André Rosemberg</a>
  <nav>
    <a href="index.html">Início</a>
    <a href="textos.html">Textos</a>
    <a href="notas.html">Notas</a>
    <a href="contato.html" class="ativo">Contato</a>
  </nav>
</header>

<main>
  <h1 class="page-titulo">Contato</h1>
  <p class="contato-intro">
    Para dúvidas, propostas ou comentários, escreva pelo formulário abaixo
    ou diretamente para
    <a href="mailto:arosem1910@gmail.com" style="color: var(--accent);">arosem1910@gmail.com</a>.
  </p>

  <form action="https://formspree.io/f/SUBSTITUA_AQUI" method="POST">
    <div>
      <label for="nome">Nome</label>
      <input type="text" id="nome" name="nome" required placeholder="Seu nome">
    </div>
    <div>
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" required placeholder="seu@email.com">
    </div>
    <div>
      <label for="mensagem">Mensagem</label>
      <textarea id="mensagem" name="mensagem" required placeholder="Escreva aqui..."></textarea>
    </div>
    <button type="submit">Enviar</button>
  </form>
</main>

<footer>
  © <span id="ano"></span> André Rosemberg
</footer>

<script>document.getElementById('ano').textContent = new Date().getFullYear();</script>
</body>
</html>
